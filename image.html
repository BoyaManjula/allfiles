<html>
<head>
<title>javascript program</title>
<script language="javascript">
function f1()
{
   document.getElementById("myimage").src="image1.jpg";
 }
function f2()
{
   document.getElementById("myimage").src="image2.jpg";
 }
</script>
</head>
<body>
<center><img src="image2.jpg" width="150px" height="150px" id="myimage" OnMouseOver="f1()" onMouseOut="f2()"></center>
</body>
</html>

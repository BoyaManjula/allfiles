<html>
    <head>
       <title>div inside div</title>
    </head>
    <style>
   #outer{
     height:150px;
     width:100px;
     border:2px solid black;
     background-color: red;
    }
   .inner{
       height:50px;
       width:80px;
       border:2px solid black;
       margin:10px;
         }
   #div1{
       background-color:aqua;
   }
   #div2{
       background-color:blueviolet;
   }
 
    </style>
    <body> 
     <div id="outer">
       <div class="inner" id="div1"></div>
       <div class="inner" id="div2"></div>
      </div>
    </body>
    </html>
